<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Browser Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1 id="heading">Mini Browser Dashboard</h1>
        <button id="themeBtn">Dark Mode</button>
    </header>

    <!-- Search -->

    <div class="container">
        <div class="card">
            <h2>Search filter</h2>
            <input type="text" id="searchinput" placeholder="Search Notes">
        </div>
        
        <!-- Notes -->

        <div class="card">
            <h2>Notes</h2>
            <textarea id="noteInput" placeholder="Write something..."></textarea>
            <p>Characters: <span id="charCount">0</span></p>
            <button id="addNotesBtn">Add Note</button>
            <ul id="noteList"></ul>
        </div>

        <!-- Clock -->

        <div class="card">
            <h2>Digital Clock</h2>
            <h1 id="clock">00:00:00</h1>
            <p id="date"></p>
        </div>

        <!-- Stopwatch -->

        <div class="card">
            <h2>Stopwatch</h2>
            <h1 id="stopwatch">00:00:00</h1>
            <button id="startBtn">Start</button>
            <button id="stopBtn">Stop</button>
            <button id="restBtn">Reset</button>
        </div>

        <!-- Countdown -->

        <div class="card">
            <h2>Countdown Timer</h2>
            <input type="number" id="countInput" placeholder="Seconds">
            <button id="countStart">Start</button>
            <h3 id="countDisplay">0</h3>
        </div>

        <!-- Password Toggle -->

        <div class="card">
            <h2>Password Toggle</h2>
            <input type="password" id="password">
            <button id="togglePassword">Show</button>
        </div>

        <!-- Mouse Events -->

        <div class="card" id="hoverBox">
            <h2>Hover Area</h2>
            <p>Move mouse here</p>
        </div>

        <!-- Keyboard Events -->

        <div class="card">
            <h2>Keyboard Tracker</h2>
            <input type="text" id="keyInput" placeholder="Type Here">
            <p id="keyResult">Pressed Key:</p>
        </div>

        <!-- Current Window -->

        <div class="card">
            <h2>Window Size</h2>
            <p id="windowSize"></p>
        </div>

        <!-- Scroll -->



    </div>
    
    <script src="script.js"></script>
</body>
</html>

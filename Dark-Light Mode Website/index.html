<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Mode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 id="heading">Dark / Light Mode Website</h1>

        <button id="themeBtn">Dark Mode</button>

        <div class="font-controls">
            <button id="increaseBtn">A+</button>
            <button id="decreasebtn">A-</button>
        </div>

        <p id="text">
            Welcome to my website. You can switch theme and change font size.
        </p>

    </div>

    <script src="script.js"></script>
</body>
</html>

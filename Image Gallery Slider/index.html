<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery / Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="gallery">

        <div class="main-image">
            <button id="preBtn">⬅</button>
            <img id="preview" src="https://picsum.photos/id/1015/600/400" alt="Image">
            <button id="nextBtn">➡</button>
        </div>

        <div class="thumbnails">
            <img class="thumb active"
            src="https://picsum.photos/id/1015/150/100">

            <img class="thumb"
            src="https://picsum.photos/id/1016/150/100">

            <img class="thumb"
            src="https://picsum.photos/id/1018/150/100">

            <img class="thumb"
            src="https://picsum.photos/id/1020/150/100">

        </div>


    </div>

    <script src="script.js"></script>
</body>
</html>

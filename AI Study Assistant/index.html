<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="sidebar">

            <h2>StudyAI</h2>

            <ul>
                <li>📝 Notes</li>
                <li>❓ Quiz</li>
                <li>⏱ Timer</li>
                <li>📊 Progress</li>
                <li>💬 Chat</li>
            </ul>
        </div>

        <div class="main">
            <h1>AI Study Dashboard</h1>
            <div class="cards">
                <div class="card">
                    <h3>Notes</h3>
                    <textarea id="notes"></textarea>
                    <button onclick="saveNotes()">Save Notes</button>
                </div>

                <div class="card">
                    <h3>Quiz Generator</h3>
                    <p id="quizQuestion">Click Generate</p>
                </div>
            </div>
        </div>



    </div>






    
    <script src="script.js"></script>
</body>
</html>

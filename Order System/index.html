<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class = container>
        <h1>Food Order System</h1>

        <div class = "products">

            <div class = "card">
                <img src = "https://picsum.photos/200?1">
                <h2>Pizza</h2>
                <p>Price: $10</p>
                <button onclick="addToCart('pizza',150)">Add to Cart</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/200?2">
                <h2>Burger</h2>
                <p>Price: $8</p>
                <button onclick="addToCart('burger',120)">Add to Cart</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/200?3">
                <h2>Pasta</h2>
                <p>Price: $12</p>
                <button onclick="addToCart('pasta',180)">Add to Cart</button>
            </div>

        </div>

        <div class="cart">
            <h2>Your Cart</h2>
            <div id="cardItems"></div>
            <h3>Total: $<span id="totalPrice">0</span></h3>
            <button class="order-btn" onclick="placeOrder()">Place Order</button>                           Place Order

        </div>
        </div>
    
    <script src="script.js"></script>
</body>
</html>

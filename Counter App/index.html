<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Counder App</h1>
        <div class="counter-box">
            <h2 id="count">0</h2>
            <p id="status">Let's Start</p>
        </div>

        <div class="buttons">
            <button id="decreas">-</button>
            <button id="reset">Reset</button>
            <button id="increas">+</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>

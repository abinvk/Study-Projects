<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 id="mainHeading">Student Dashboard</h1>

        <!-- Add Student -->

            <div class="card">
                <h2>Add Student</h2>
                <input type="text" id="studentName" placeholder="Enter Student Name">
                <button onclick="addStudent()">Add Student</button>
                <button onclick="changeTitle()">
                    Change Title
                </button>
            </div>

            <!-- Attendance -->

            <div class="card">
                <h2>Attendance Counder</h2>
                <p>Attendance: <span id="count">0</span></p>

                <button onclick="increaseAttendance()">
                    Mark Present
                </button>
            </div>

            <!-- Search -->

            <div class="card">
                <h2>Search Student</h2>

                <input type="text"
                id="searchInput"
                placeholder="Search Student">

                <button onclick="searchStudent()">
                    Search
                </button>
            </div>

            <!-- Theme -->

            <div class="card">
                <h2>Theme Changer</h2>

                <button onclick="toggleTheme()">
                    Toggle Theme
                </button>
            </div>

        <!-- Student List -->
            <div id="studentList"></div>
    </div>


    <script src="script.js"></script>
</body>
</html>
